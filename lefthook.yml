pre-commit:
  parallel: true
  commands:
    ascii-only:
      glob: "*.{sh,nix,yml,json}"
      run: timeout ${LEFTHOOK_ASCII_ONLY_TIMEOUT:-30} lefthook-ascii-only {staged_files}
    nix-flake-eval:
      glob: "*.nix"
      env:
        LEFTHOOK_NIX_FLAKE_EVAL_ATTR: ".#homeManagerModules.default"
      run: timeout ${LEFTHOOK_NIX_FLAKE_EVAL_TIMEOUT:-60} lefthook-nix-flake-eval
    bats-parse:
      glob: "*.bats"
      run: timeout ${LEFTHOOK_BATS_PARSE_TIMEOUT:-30} bats -c {staged_files}
    bats-unit:
      glob: "*.bats"
      run: timeout ${LEFTHOOK_BATS_UNIT_TIMEOUT:-120} bats --jobs "$(nproc)" {staged_files}
    tdd-order-bats:
      run: timeout ${LEFTHOOK_TDD_ORDER_TIMEOUT:-30} lefthook-tdd-order-bats
    no-shell-functions:
      exclude: "^tests/"
      run: timeout ${LEFTHOOK_NO_SHELL_FUNCTIONS_TIMEOUT:-30} lefthook-no-shell-functions {staged_files}
    git-no-local-paths:
      exclude: "^flake\\.(nix|lock)$"
      run: timeout ${LEFTHOOK_GIT_NO_LOCAL_PATHS_TIMEOUT:-30} lefthook-git-no-local-paths {staged_files}
    markdownlint:
      glob: "*.md"
      exclude: "^(CLAUDE\\.md|agent/set/skills/|files/commands/|templates/)"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_TIMEOUT:-30} lefthook-markdownlint {staged_files}
    markdownlint-agentic:
      glob: "*.md"
      exclude: "^(README|CHANGELOG|SPEC)\\.md$|^docs/"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_AGENTIC_TIMEOUT:-30} lefthook-markdownlint-agentic {staged_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: timeout ${LEFTHOOK_YAMLLINT_TIMEOUT:-30} lefthook-yamllint {staged_files}
    nix-flake-check:
      skip: true

pre-push:
  parallel: true
  commands:
    ascii-only:
      glob: "*.{sh,nix,yml,json}"
      run: timeout ${LEFTHOOK_ASCII_ONLY_TIMEOUT:-30} lefthook-ascii-only {push_files}
    nix-flake-eval:
      glob: "*.nix"
      env:
        LEFTHOOK_NIX_FLAKE_EVAL_ATTR: ".#homeManagerModules.default"
      run: timeout ${LEFTHOOK_NIX_FLAKE_EVAL_TIMEOUT:-60} lefthook-nix-flake-eval
    bats-changed:
      glob: "*.{sh,bats}"
      run: timeout ${LEFTHOOK_BATS_CHANGED_TIMEOUT:-120} lefthook-bats-changed {push_files}
    bats-parse:
      glob: "*.bats"
      run: timeout ${LEFTHOOK_BATS_PARSE_TIMEOUT:-30} bats -c {push_files}
    bats-unit:
      glob: "*.bats"
      run: timeout ${LEFTHOOK_BATS_UNIT_TIMEOUT:-120} bats --jobs "$(nproc)" {push_files}
    tdd-order-bats:
      run: timeout ${LEFTHOOK_TDD_ORDER_TIMEOUT:-30} lefthook-tdd-order-bats
    no-shell-functions:
      exclude: "^tests/"
      run: timeout ${LEFTHOOK_NO_SHELL_FUNCTIONS_TIMEOUT:-30} lefthook-no-shell-functions {push_files}
    git-no-local-paths:
      exclude: "^flake\\.nix$"
      run: timeout ${LEFTHOOK_GIT_NO_LOCAL_PATHS_TIMEOUT:-30} lefthook-git-no-local-paths {push_files}
    markdownlint:
      glob: "*.md"
      exclude: "^(CLAUDE\\.md|agent/set/skills/|files/commands/|templates/)"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_TIMEOUT:-30} lefthook-markdownlint {push_files}
    markdownlint-agentic:
      glob: "*.md"
      exclude: "^(README|CHANGELOG|SPEC)\\.md$|^docs/"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_AGENTIC_TIMEOUT:-30} lefthook-markdownlint-agentic {push_files}
    linter-coverage:
      run: timeout ${LEFTHOOK_LINTER_COVERAGE_TIMEOUT:-30} lefthook-linter-coverage
    yamllint:
      glob: "*.{yml,yaml}"
      run: timeout ${LEFTHOOK_YAMLLINT_TIMEOUT:-30} lefthook-yamllint {push_files}
